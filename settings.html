<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NEONCORE | Settings</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav class="top-nav">
      <div class="brand">NEONCORE</div>
      <a href="profile.html" class="login-link">Back to Profile</a>
    </nav>
    <form class="settings-form">
      <!-- your settings inputs -->
    </form>
    <section class="features">
      <h2>Settings</h2>

      <div class="feature-grid">
        <div class="feature-card">
          <div class="input-group">
            <label>Change Email</label>
            <input type="email" placeholder="new@neoncore.io" />
          </div>

          <div class="input-group">
            <label>Change Address</label>
            <input type="text" placeholder="New City, Sector" />
          </div>

          <div class="input-group">
            <label>Change Password</label>
            <input type="password" placeholder="••••••••" />
          </div>

          <div class="input-group">
            <label> <input type="checkbox" /> Enable Dark Neon Theme </label>
          </div>

          <button class="cta-btn">Save Changes</button>
        </div>
      </div>
    </section>

    <footer class="site-footer">
      <p class="footer-copy">© 2026 NEONCORE</p>
    </footer>
  </body>
</html>
