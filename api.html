<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gaming Components | NEONCORE</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Additional styles for gaming components */
      .search-section {
        text-align: center;
        padding: 2rem;
      }

      .search-box {
        display: flex;
        gap: 1rem;
        justify-content: center;
        flex-wrap: wrap;
        margin: 2rem 0;
      }

      .search-box input {
        padding: 12px 20px;
        width: 300px;
        background: #12122a;
        border: 1px solid #1f1f3a;
        color: white;
        border-radius: 8px;
        font-size: 1rem;
      }

      .search-box input:focus {
        outline: none;
        border-color: #00f6ff;
        box-shadow: 0 0 10px rgba(0, 246, 255, 0.3);
      }

      .component-card {
        background: #12122a;
        border: 1px solid #1f1f3a;
        border-radius: 12px;
        padding: 1.5rem;
        transition: all 0.3s ease;
        margin-bottom: 1.5rem;
      }

      .component-card:hover {
        transform: translateY(-5px);
        border-color: #ff2cf7;
        box-shadow: 0 0 20px rgba(255, 44, 247, 0.3);
      }

      .component-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
      }

      .component-name {
        font-size: 1.5rem;
        color: #00f6ff;
        margin: 0;
      }

      .component-price {
        font-size: 1.8rem;
        color: #ff2cf7;
        font-weight: bold;
      }

      .component-details {
        margin: 1rem 0;
        padding: 1rem;
        background: #0a0a0f;
        border-radius: 8px;
      }

      .component-details p {
        margin: 0.5rem 0;
        color: #cfcfff;
      }

      .component-details strong {
        color: #00f6ff;
        display: inline-block;
        min-width: 100px;
      }

      .button-group {
        display: flex;
        gap: 1rem;
        margin-top: 1rem;
      }

      .cart-btn {
        flex: 1;
        background: transparent;
        border: 2px solid #00f6ff;
        color: #00f6ff;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .cart-btn:hover {
        background: #00f6ff;
        color: #0a0a0f;
      }

      .save-btn {
        flex: 1;
        background: transparent;
        border: 2px solid #ff2cf7;
        color: #ff2cf7;
        padding: 10px;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .save-btn:hover {
        background: #ff2cf7;
        color: #0a0a0f;
      }

      .saved-badge {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #ff2cf7;
        color: white;
        padding: 10px 20px;
        border-radius: 30px;
        cursor: pointer;
        z-index: 1000;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1);
        }
      }

      .notification {
        position: fixed;
        top: 80px;
        right: 20px;
        background: #00f6ff;
        color: #0a0a0f;
        padding: 1rem 2rem;
        border-radius: 8px;
        animation: slideIn 0.3s ease;
        z-index: 1000;
        font-weight: bold;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .results-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 2rem;
        padding: 2rem;
      }

      .cart-summary {
        background: #12122a;
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 2rem;
        text-align: center;
      }

      .view-cart-btn {
        background: #00f6ff;
        color: #0a0a0f;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        margin-left: 1rem;
      }
    </style>
  </head>
  <body>
    <nav class="top-nav">
      <div class="brand">NEONCORE GAMING</div>
      <div>
        <a href="profile.html" class="login-link">Profile</a>
        <a href="index.html" class="login-link">Home</a>
        <a
          href="saved-components.html"
          class="login-link"
          style="border-color: #ff2cf7"
          >⭐ Saved Items</a
        >
        <a href="#" id="viewCartBtn" class="login-link"
          >🛒 Cart (<span id="cartCount">0</span>)</a
        >
      </div>
    </nav>

    <section class="features">
      <h2>🔧 Gaming Components Store</h2>
      <p style="text-align: center; margin-bottom: 2rem">
        Search for the latest gaming hardware - GPUs, CPUs, Motherboards, and
        more!
      </p>

      <div class="search-section">
        <div class="search-box">
          <input
            type="text"
            id="componentSearch"
            placeholder="Search components (e.g., RTX 4090, Ryzen, RAM)"
            onkeypress="if (event.key === 'Enter') searchComponents();"
          />
          <button class="cta-btn" onclick="searchComponents()">
            🔍 Search
          </button>
          <button class="cta-btn outline-btn" onclick="clearSearch()">
            Clear
          </button>
        </div>
      </div>

      <div id="results"></div>
    </section>

    <footer class="site-footer">
      <p class="footer-copy">© 2026 NEONCORE | Gaming Components Store</p>
    </footer>

    <script>
      // Gaming Components Database (Realistic gaming hardware)
      const componentsDatabase = [

        },
        {

        {

          type: "Motherboard",
          price: 629,
          brand: "ASUS",
          specs: "LGA 1700, DDR5, PCIe 5.0",
          stock: 7,
          image: "🔧",
        },
        {
          id: 8,
          name: "MSI MPG B650 Carbon WiFi",
          type: "Motherboard",
          price: 289,
          brand: "MSI",
          specs: "AM5, DDR5, PCIe 5.0",

        },
        {

          type: "Storage",

          specs: "PCIe 4.0, 7450MB/s",

        },
        {
          id: 10,

          type: "Storage",
          price: 329,
          brand: "WD",
          specs: "PCIe 4.0, Gaming Storage",

        },
        {
          id: 11,
          name: "Corsair RM1000e 1000W PSU",
          type: "Power Supply",
          price: 179,
          brand: "Corsair",
          specs: "80+ Gold, Fully Modular",

        },
        {
          id: 12,

          price: 529,
          brand: "Seasonic",
          specs: "80+ Titanium, 1600W",
          stock: 5,

        },
        {
          id: 13,
          name: "NZXT Kraken Elite 360",
          type: "Cooler",
          price: 279,
          brand: "NZXT",
          specs: "360mm AIO, LCD Display",
          stock: 11,
          image: "🌀",
        },
        {
          id: 14,
          name: "Corsair iCUE H150i Elite",
          type: "Cooler",
          price: 189,
          brand: "Corsair",
          specs: "360mm Liquid Cooling",
          stock: 16,
          image: "🌀",
        },
        {
          id: 15,
          name: "ASUS ROG Swift OLED PG27AQDM",
          type: "Monitor",
          price: 899,
          brand: "ASUS",
          specs: "27-inch 240Hz OLED, 0.03ms",
          stock: 9,
          image: "🖥️",
        },
        {
          id: 16,
          name: "Samsung Odyssey G9",
          type: "Monitor",
          price: 1299,
          brand: "Samsung",
          specs: "49-inch 240Hz, 1ms, Curved",
          stock: 4,
          image: "🖥️",
        },
      ];

      let cart = JSON.parse(localStorage.getItem("gamingCart")) || [];
      let savedComponents =
        JSON.parse(localStorage.getItem("savedComponents")) || [];

      // Update cart count display
      function updateCartCount() {
        const cartCountSpan = document.getElementById("cartCount");
        if (cartCountSpan) {
          cartCountSpan.textContent = cart.length;
        }
      }

      // Show notification
      function showNotification(message, type = "success") {
        const notification = document.createElement("div");
        notification.className = "notification";
        notification.textContent = message;
        document.body.appendChild(notification);

        setTimeout(() => {
          notification.remove();
        }, 3000);
      }

      // Add to cart function
      function addToCart(componentId) {
        const component = componentsDatabase.find((c) => c.id === componentId);
        if (component) {
          const existingItem = cart.find((item) => item.id === componentId);
          if (existingItem) {
            existingItem.quantity = (existingItem.quantity || 1) + 1;
            showNotification(
              `🛒 Added another ${component.name} to cart!`,
              "success",
            );
          } else {
            cart.push({ ...component, quantity: 1 });
            showNotification(`✅ ${component.name} added to cart!`, "success");
          }
          localStorage.setItem("gamingCart", JSON.stringify(cart));
          updateCartCount();
        }
      }

      // Save component function (like country saving)
      function saveComponent(componentId) {
        const component = componentsDatabase.find((c) => c.id === componentId);
        if (component) {
          const exists = savedComponents.some(
            (item) => item.id === componentId,
          );
          if (exists) {
            showNotification(`⚠️ ${component.name} is already saved!`, "error");
            return;
          }

          savedComponents.push(component);
          localStorage.setItem(
            "savedComponents",
            JSON.stringify(savedComponents),
          );
          showNotification(
            `⭐ ${component.name} saved to favorites!`,
            "success",
          );
        }
      }

      // Search components
      function searchComponents() {
        const searchTerm = document
          .getElementById("componentSearch")
          .value.trim()
          .toLowerCase();
        const resultsDiv = document.getElementById("results");

        if (searchTerm === "") {
          resultsDiv.innerHTML =
            '<div class="feature-card" style="text-align:center;"><p>🔍 Enter a component name to search (e.g., RTX 4090, Ryzen, RAM)</p></div>';
          return;
        }

        const filtered = componentsDatabase.filter(
          (comp) =>
            comp.name.toLowerCase().includes(searchTerm) ||
            comp.type.toLowerCase().includes(searchTerm) ||
            comp.brand.toLowerCase().includes(searchTerm) ||
            comp.specs.toLowerCase().includes(searchTerm),
        );

        if (filtered.length === 0) {
          resultsDiv.innerHTML = `
          <div class="feature-card" style="text-align:center;">
            <p>❌ No components found matching "${searchTerm}"</p>
            <p>Try searching for: GPU, CPU, RAM, Motherboard, Storage, or specific brands</p>
          </div>
        `;
          return;
        }

        resultsDiv.innerHTML = `
        <div class="results-grid">
          ${filtered
            .map(
              (comp) => `
            <div class="component-card">
              <div class="component-header">
                <h3 class="component-name">${comp.image} ${comp.name}</h3>
                <div class="component-price">$${comp.price}</div>
              </div>
              <div class="component-details">
                <p><strong>🏷️ Type:</strong> ${comp.type}</p>
                <p><strong>🏢 Brand:</strong> ${comp.brand}</p>
                <p><strong>⚙️ Specs:</strong> ${comp.specs}</p>
                <p><strong>📦 Stock:</strong> ${comp.stock} units</p>
              </div>
              <div class="button-group">
                <button class="cart-btn" onclick="addToCart(${comp.id})">
                  🛒 Add to Cart
                </button>
                <button class="save-btn" onclick="saveComponent(${comp.id})">
                  ⭐ Save Component
                </button>
              </div>
            </div>
          `,
            )
            .join("")}
        </div>
      `;
      }

      function clearSearch() {
        document.getElementById("componentSearch").value = "";
        document.getElementById("results").innerHTML = `
        <div class="feature-card" style="text-align:center;">
          <p>🔍 Enter a component name to start searching!</p>
          <p style="font-size:0.9rem; margin-top:1rem;">Popular searches: RTX 4090, Ryzen 9, DDR5 RAM, Gaming Monitor</p>
        </div>
      `;
      }

      // View cart
      function viewCart() {
        if (cart.length === 0) {
          showNotification("🛒 Your cart is empty!", "error");
          return;
        }

        let cartMessage = "🛒 YOUR CART:\n\n";
        let total = 0;
        cart.forEach((item, index) => {
          const itemTotal = item.price * (item.quantity || 1);
          total += itemTotal;
          cartMessage += `${index + 1}. ${item.name} x${item.quantity || 1} = $${itemTotal}\n`;
        });
        cartMessage += `\n💰 TOTAL: $${total}`;
        cartMessage += `\n\nClick OK to checkout (simulated)`;

        if (confirm(cartMessage + "\n\nProceed to checkout?")) {
          showNotification(
            "🎉 Order placed! Thank you for shopping at NEONCORE!",
            "success",
          );
          cart = [];
          localStorage.setItem("gamingCart", JSON.stringify(cart));
          updateCartCount();
        }
      }

      // Initial display
      clearSearch();
      updateCartCount();

      // Add view cart button event
      const viewCartBtn = document.getElementById("viewCartBtn");
      if (viewCartBtn) {
        viewCartBtn.addEventListener("click", (e) => {
          e.preventDefault();
          viewCart();
        });
      }
    </script>
  </body>
</html>
