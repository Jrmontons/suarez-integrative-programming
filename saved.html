<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Saved Countries | NEONCORE</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      body {
        background: #0a0a0f;
        color: white;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        padding: 2rem;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
        padding: 1rem;
        border-bottom: 1px solid #1f1f3a;
        background: #12122a;
        border-radius: 12px;
      }

      .header h2 {
        color: #00f6ff;
        margin: 0;
        font-size: 2rem;
      }

      .nav-links {
        display: flex;
        gap: 1rem;
      }

      .nav-link {
        padding: 0.5rem 1rem;
        border: 1px solid #00f6ff;
        color: #00f6ff;
        text-decoration: none;
        border-radius: 6px;
        transition: all 0.3s ease;
      }

      .nav-link:hover {
        background: #00f6ff;
        color: #0a0a0f;
      }

      .saved-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 2rem;
        padding: 1rem;
      }

      .saved-card {
        background: #12122a;
        border: 1px solid #1f1f3a;
        border-radius: 12px;
        padding: 1.5rem;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease;
        position: relative;
      }

      .saved-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0 25px rgba(0, 246, 255, 0.25);
      }

      .saved-card img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 8px;
        margin-bottom: 1rem;
        border: 2px solid #1f1f3a;
      }

      .saved-card h3 {
        color: #ff2cf7;
        margin-bottom: 0.5rem;
        font-size: 1.5rem;
        text-align: center;
      }

      .country-detail {
        margin: 0.8rem 0;
        padding: 0.5rem;
        background: #0a0a0f;
        border-radius: 6px;
        border-left: 3px solid #00f6ff;
      }

      .country-detail p {
        margin: 0.3rem 0;
        color: #cfcfff;
        font-size: 0.95rem;
      }

      .country-detail strong {
        color: #00f6ff;
        display: inline-block;
        min-width: 100px;
      }

      .delete-btn {
        width: 100%;
        margin-top: 1rem;
        padding: 0.7rem;
        background: transparent;
        border: 2px solid #ff2cf7;
        color: #ff2cf7;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .delete-btn:hover {
        background: #ff2cf7;
        color: #0a0a0f;
        box-shadow: 0 0 20px rgba(255, 44, 247, 0.7);
      }

      .empty-state {
        text-align: center;
        padding: 4rem;
        background: #12122a;
        border-radius: 12px;
        border: 1px solid #1f1f3a;
        max-width: 500px;
        margin: 4rem auto;
      }

      .empty-state h3 {
        color: #00f6ff;
        margin-bottom: 1rem;
        font-size: 2rem;
      }

      .empty-state p {
        color: #8f8fff;
        margin-bottom: 2rem;
        font-size: 1.1rem;
      }

      .empty-state .cta-btn {
        display: inline-block;
        padding: 1rem 2rem;
        font-size: 1.1rem;
      }

      .stats-bar {
        display: flex;
        justify-content: space-around;
        margin: 2rem 0;
        padding: 1.5rem;
        background: #12122a;
        border-radius: 12px;
        border: 1px solid #1f1f3a;
      }

      .stat-item {
        text-align: center;
      }

      .stat-value {
        font-size: 2.5rem;
        color: #ff2cf7;
        font-weight: bold;
      }

      .stat-label {
        color: #8f8fff;
        font-size: 1rem;
        margin-top: 0.5rem;
      }

      .action-buttons {
        display: flex;
        gap: 1rem;
        justify-content: center;
        margin: 2rem 0;
      }

      .clear-btn {
        padding: 0.7rem 1.5rem;
        background: transparent;
        border: 2px solid #ff2cf7;
        color: #ff2cf7;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .clear-btn:hover {
        background: #ff2cf7;
        color: #0a0a0f;
      }

      .refresh-btn {
        padding: 0.7rem 1.5rem;
        background: transparent;
        border: 2px solid #00f6ff;
        color: #00f6ff;
        border-radius: 8px;
        cursor: pointer;
        font-size: 1rem;
        transition: all 0.3s ease;
      }

      .refresh-btn:hover {
        background: #00f6ff;
        color: #0a0a0f;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      .notification {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #00f6ff;
        color: #0a0a0f;
        padding: 1rem 2rem;
        border-radius: 8px;
        animation: slideIn 0.3s ease;
        z-index: 1000;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <h2>🌍 Saved Countries</h2>
      <div class="nav-links">
        <a href="api.html" class="nav-link">🔍 API Explorer</a>
        <a href="profile.html" class="nav-link">👤 Profile</a>
      </div>
    </div>

    <div id="stats" class="stats-bar"></div>

    <div class="action-buttons">
      <button class="refresh-btn" onclick="loadSavedCountries()">
        🔄 Refresh List
      </button>
      <button class="clear-btn" onclick="clearAllSaved()">🗑️ Clear All</button>
    </div>

    <div id="savedList" class="saved-grid"></div>

    <script>
      function loadSavedCountries() {
        const container = document.getElementById("savedList");
        const statsContainer = document.getElementById("stats");
        const saved = JSON.parse(localStorage.getItem("savedCountries")) || [];

        // Update stats
        const totalCountries = saved.length;
        const uniqueRegions = [...new Set(saved.map((c) => c.region))].length;
        const totalPopulation = saved.reduce(
          (sum, c) => sum + (c.population || 0),
          0,
        );

        statsContainer.innerHTML = `
          <div class="stat-item">
            <div class="stat-value">${totalCountries}</div>
            <div class="stat-label">Saved Countries</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${uniqueRegions}</div>
            <div class="stat-label">Regions</div>
          </div>
          <div class="stat-item">
            <div class="stat-value">${(totalPopulation / 1000000).toFixed(1)}M</div>
            <div class="stat-label">Total Population</div>
          </div>
        `;

        if (saved.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <h3>No Saved Countries Yet</h3>
              <p>Explore countries in the API Explorer and save your favorites!</p>
              <a href="api.html" class="cta-btn">Go to API Explorer</a>
            </div>
          `;
        } else {
          container.innerHTML = saved
            .map(
              (country, index) => `
            <div class="saved-card">
              <img src="${country.flag}" alt="${country.name} flag" onerror="this.src='https://via.placeholder.com/300x150?text=Flag+Not+Available'">
              <h3>${country.name}</h3>
              
              <div class="country-detail">
                <p><strong>🏛️ Capital:</strong> ${country.capital || "N/A"}</p>
                <p><strong>🌍 Region:</strong> ${country.region || "N/A"}</p>
                <p><strong>👥 Population:</strong> ${country.population ? country.population.toLocaleString() : "N/A"}</p>
                <p><strong>🗣️ Languages:</strong> ${country.languages || "N/A"}</p>
                <p><strong>💰 Currency:</strong> ${country.currency || "N/A"} (${country.currencyCode || ""})</p>
              </div>
              
              <button class="delete-btn" onclick="deleteItem(${index})">
                🗑️ Remove from Saved
              </button>
            </div>
          `,
            )
            .join("");
        }
      }

      function deleteItem(index) {
        if (confirm("Remove this country from your saved list?")) {
          let saved = JSON.parse(localStorage.getItem("savedCountries")) || [];
          saved.splice(index, 1);
          localStorage.setItem("savedCountries", JSON.stringify(saved));
          loadSavedCountries();
          showNotification("✅ Country removed successfully!");
        }
      }

      function clearAllSaved() {
        if (saved.length === 0) {
          showNotification("📭 No items to clear");
          return;
        }

        if (confirm("Are you sure you want to remove all saved countries?")) {
          localStorage.removeItem("savedCountries");
          loadSavedCountries();
          showNotification("🗑️ All countries cleared!");
        }
      }

      function showNotification(message) {
        const notification = document.createElement("div");
        notification.className = "notification";
        notification.textContent = message;

        document.body.appendChild(notification);

        setTimeout(() => {
          notification.remove();
        }, 3000);
      }

      // Load saved countries on page load
      let saved = JSON.parse(localStorage.getItem("savedCountries")) || [];
      loadSavedCountries();
    </script>
  </body>
</html>
